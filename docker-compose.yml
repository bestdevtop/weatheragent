name: weatherinformagent

services:
  api:
    build: .
    container_name: weather-agent-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env

  n8n:
    image: n8nio/n8n:latest
    container_name: weather-agent-n8n
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5678:5678"
    env_file:
      - .env
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      GENERIC_TIMEZONE: UTC
      TZ: UTC
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
    external: true
    name: weatherinformagent_n8n_data
